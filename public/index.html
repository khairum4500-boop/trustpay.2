<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPay</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1 class="logo">TRUST<span>PAY</span></h1>

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <input id="user" placeholder="মোবাইল নম্বর">
    <input id="pass" type="password" placeholder="পাসওয়ার্ড">
    <button onclick="login()">লগইন</button>
    <p onclick="showRegister()">নিবন্ধন করুন</p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="card hidden">
    <input id="ruser" placeholder="মোবাইল নম্বর">
    <input id="rpass" type="password" placeholder="পাসওয়ার্ড">
    <button onclick="register()">রেজিস্টার</button>
    <p onclick="showLogin()">লগইন করুন</p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
