<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrustPay Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
  <div class="card">
    <h1>TrustPay</h1>
    <input id="user" placeholder="Phone">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <button onclick="register()">Register</button>
    <a href="https://t.me/Helpline_py">Support</a>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <h3 id="balance"></h3>

  <div id="menu"></div>
  <div id="content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
